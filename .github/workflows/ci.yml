name: Tests Automatisés
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des outils
        run: npm install

      - name: Exécution des tests (Linting)
        run: npm test